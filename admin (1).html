<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENUM · Espace Administrateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root {
  --navy:       #050a1a;
  --dark:       #080f22;
  --card-bg:    #0b1428;
  --blue-deep:  #0d1b5e;
  --blue-mid:   #1a3a8f;
  --blue-bright:#2563eb;
  --cyan:       #00b4d8;
  --cyan-light: #48cae4;
  --white:      #e8f4ff;
  --muted:      #7ea8c9;
  --border:     rgba(0,180,216,0.18);
  --glow:       rgba(0,180,216,0.15);

  /* Role colors */
  --president:  #f59e0b;
  --vp:         #8b5cf6;
  --sg:         #10b981;
  --tresorier:  #ef4444;
  --formation:  #06b6d4;
  --comm:       #ec4899;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Exo 2', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── CIRCUIT BG ─── */
.circuit-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.035;
  background-image:
    linear-gradient(rgba(0,180,216,1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,216,1) 1px, transparent 1px);
  background-size: 60px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 15%, rgba(37,99,235,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(0,180,216,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ═══════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════ */
#loginPage {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
.login-box {
  background: rgba(8,15,34,0.95);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 3rem 2.5rem;
  width: 100%; max-width: 440px;
  position: relative; z-index: 1;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(0,180,216,0.07);
  animation: loginAppear 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes loginAppear {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.login-logo {
  text-align: center; margin-bottom: 2rem;
}
.login-logo img {
  height: 64px;
  filter: drop-shadow(0 0 16px rgba(0,180,216,0.5));
  animation: floatLogo 3s ease-in-out infinite;
}
@keyframes floatLogo {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.login-logo h1 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 2rem;
  letter-spacing: 4px; text-transform: uppercase;
  background: linear-gradient(90deg, #2563eb, var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-top: 0.8rem;
}
.login-logo p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase;
  margin-top: 0.3rem;
}
.login-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  display: block; margin-bottom: 0.45rem;
}
.login-input, .login-select {
  width: 100%;
  background: rgba(5,10,26,0.8);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.9rem 1.1rem;
  color: var(--white);
  font-family: 'Exo 2', sans-serif; font-size: 0.95rem;
  outline: none; margin-bottom: 1.2rem;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.login-input:focus, .login-select:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
}
.login-select option { background: #080f22; }
.login-btn {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(90deg, #2563eb, var(--cyan));
  border: none; border-radius: 8px;
  color: var(--navy);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 1rem;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 24px rgba(0,180,216,0.3);
}
.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(0,180,216,0.5);
}
.login-error {
  display: none;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 6px;
  padding: 0.8rem 1rem;
  color: #fca5a5;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  text-align: center;
}
.back-link {
  display: block; text-align: center; margin-top: 1.5rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem; letter-spacing: 2px;
  color: var(--muted); text-decoration: none;
  transition: color 0.2s;
}
.back-link:hover { color: var(--cyan); }

/* ═══════════════════════════════════════════
   ADMIN LAYOUT
═══════════════════════════════════════════ */
#adminPage { display: none; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 260px;
  background: rgba(8,15,34,0.97);
  border-right: 1px solid var(--border);
  z-index: 100;
  display: flex; flex-direction: column;
  transition: transform 0.3s;
}
.sidebar-logo {
  padding: 1.5rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo img {
  height: 36px;
  filter: drop-shadow(0 0 8px rgba(0,180,216,0.4));
}
.sidebar-logo span {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 1.3rem;
  letter-spacing: 3px; text-transform: uppercase;
  background: linear-gradient(90deg, #2563eb, var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* User card in sidebar */
.sidebar-user {
  margin: 1.2rem 1.2rem 0.8rem;
  background: rgba(13,27,94,0.3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  display: flex; align-items: center; gap: 0.8rem;
}
.sidebar-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 1rem; color: var(--navy);
  flex-shrink: 0;
}
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 0.95rem; letter-spacing: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-user-role {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 2px;
  text-transform: uppercase;
}

/* Nav items */
.sidebar-nav { flex: 1; padding: 0.5rem 0; overflow-y: auto; }
.nav-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 3px;
  color: rgba(126,168,201,0.4); text-transform: uppercase;
  padding: 0.8rem 1.5rem 0.4rem;
}
.nav-item {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.7rem 1.5rem;
  cursor: pointer; transition: all 0.2s;
  border-left: 3px solid transparent;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; font-size: 0.95rem;
  letter-spacing: 0.5px; color: var(--muted);
  user-select: none;
}
.nav-item:hover { color: var(--white); background: rgba(0,180,216,0.05); }
.nav-item.active {
  color: var(--white);
  background: rgba(0,180,216,0.08);
  border-left-color: var(--cyan);
}
.nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
.nav-item .nav-badge {
  margin-left: auto;
  background: var(--cyan);
  color: var(--navy);
  font-size: 0.65rem; font-weight: 700;
  padding: 1px 7px; border-radius: 10px;
}

.sidebar-footer {
  padding: 1rem 1.2rem;
  border-top: 1px solid var(--border);
}
.logout-btn {
  width: 100%; padding: 0.75rem;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 8px;
  color: #fca5a5;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; font-size: 0.9rem;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: all 0.3s;
}
.logout-btn:hover {
  background: rgba(239,68,68,0.15);
  border-color: rgba(239,68,68,0.4);
}

/* ── MAIN CONTENT ── */
.main-content {
  margin-left: 260px;
  min-height: 100vh;
  padding: 2rem;
  position: relative; z-index: 1;
}

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
}
.topbar-left h2 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 1.6rem;
  letter-spacing: 2px; text-transform: uppercase;
  background: linear-gradient(90deg, #fff, var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar-left p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem; letter-spacing: 2px;
  color: var(--muted); margin-top: 0.2rem;
}
.topbar-right { display: flex; align-items: center; gap: 0.8rem; }
.notif-btn {
  width: 38px; height: 38px;
  background: rgba(13,27,94,0.4);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; font-size: 1rem;
  position: relative;
}
.notif-btn:hover { border-color: var(--cyan); background: rgba(0,180,216,0.08); }
.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}
.hamburger-admin {
  display: none;
  width: 38px; height: 38px;
  background: rgba(13,27,94,0.4);
  border: 1px solid var(--border);
  border-radius: 8px;
  align-items: center; justify-content: center;
  cursor: pointer; flex-direction: column; gap: 5px;
}
.hamburger-admin span {
  display: block; width: 18px; height: 1.5px; background: var(--cyan);
}

/* ── PANELS ── */
.panel { display: none; animation: panelIn 0.4s cubic-bezier(0.16,1,0.3,1); }
.panel.active { display: block; }
@keyframes panelIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════ */

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem; margin-bottom: 2rem;
}
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem;
  position: relative; overflow: hidden;
  transition: all 0.3s;
}
.stat-card:hover {
  border-color: rgba(0,180,216,0.35);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  transform: translateY(-2px);
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.c1::before { background: linear-gradient(90deg,#2563eb,var(--cyan)); }
.stat-card.c2::before { background: linear-gradient(90deg,var(--cyan),#10b981); }
.stat-card.c3::before { background: linear-gradient(90deg,#8b5cf6,#ec4899); }
.stat-card.c4::before { background: linear-gradient(90deg,#f59e0b,#ef4444); }

.stat-icon {
  font-size: 1.6rem; margin-bottom: 0.8rem;
}
.stat-num {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 2.2rem;
  background: linear-gradient(90deg,#60a5fa,var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1;
}
.stat-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  margin-top: 0.3rem;
}
.stat-trend {
  font-size: 0.75rem; margin-top: 0.5rem;
}
.trend-up { color: #34d399; }
.trend-down { color: #f87171; }

/* ── CARD ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.5rem;
}
.card-title {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 1.05rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 0.6rem;
}
.card-title .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  flex-shrink: 0;
}

/* ── TWO COLUMNS ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); padding: 0.7rem 1rem; text-align: left;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 0.85rem 1rem; font-size: 0.9rem; color: var(--muted);
  border-bottom: 1px solid rgba(0,180,216,0.06);
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,180,216,0.04); color: var(--white); }

/* ── BADGE ── */
.badge {
  display: inline-block;
  padding: 2px 10px; border-radius: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;
  font-weight: 600;
}
.badge-green  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.badge-blue   { background: rgba(37,99,235,0.15);  color: #93c5fd; border: 1px solid rgba(37,99,235,0.3); }
.badge-yellow { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
.badge-red    { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.badge-cyan   { background: rgba(0,180,216,0.15);  color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }

/* ── FORM ELEMENTS ── */
.f-group { margin-bottom: 1rem; }
.f-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); display: block; margin-bottom: 0.4rem;
}
.f-input, .f-select, .f-textarea {
  width: 100%;
  background: rgba(5,10,26,0.7);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 0.8rem 1rem; color: var(--white);
  font-family: 'Exo 2', sans-serif; font-size: 0.9rem;
  outline: none; transition: all 0.3s;
}
.f-input:focus, .f-select:focus, .f-textarea:focus {
  border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
}
.f-textarea { resize: vertical; min-height: 100px; }
.f-select option { background: #080f22; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* ── BUTTONS ── */
.btn {
  padding: 0.7rem 1.5rem;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 0.88rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  border-radius: 8px; border: none; cursor: pointer;
  transition: all 0.25s; display: inline-flex;
  align-items: center; gap: 6px;
}
.btn-primary {
  background: linear-gradient(90deg, #2563eb, var(--cyan));
  color: var(--navy);
  box-shadow: 0 0 20px rgba(0,180,216,0.2);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,180,216,0.4); }
.btn-ghost {
  background: transparent; color: var(--cyan);
  border: 1px solid rgba(0,180,216,0.3);
}
.btn-ghost:hover { background: rgba(0,180,216,0.08); border-color: var(--cyan); }
.btn-danger {
  background: rgba(239,68,68,0.1); color: #fca5a5;
  border: 1px solid rgba(239,68,68,0.25);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-sm { padding: 0.4rem 0.9rem; font-size: 0.78rem; }

/* ── PROGRESS BAR ── */
.progress-bar {
  background: rgba(0,180,216,0.1); border-radius: 4px; height: 6px;
  overflow: hidden; margin-top: 0.4rem;
}
.progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, #2563eb, var(--cyan));
  transition: width 1s ease;
}

/* ── ACTIVITY FEED ── */
.feed-item {
  display: flex; gap: 0.9rem; align-items: flex-start;
  padding: 0.8rem 0;
  border-bottom: 1px solid rgba(0,180,216,0.06);
}
.feed-item:last-child { border-bottom: none; }
.feed-dot {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,180,216,0.1);
  border: 1px solid rgba(0,180,216,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; flex-shrink: 0;
}
.feed-text { flex: 1; }
.feed-text strong {
  display: block; font-family: 'Rajdhani', sans-serif;
  font-weight: 600; font-size: 0.92rem; color: var(--white);
  margin-bottom: 0.15rem;
}
.feed-text span { font-size: 0.8rem; color: var(--muted); }
.feed-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 1px; color: rgba(126,168,201,0.5);
  flex-shrink: 0; margin-top: 2px;
}

/* ── ROLE HEADER STRIPE ── */
.role-stripe {
  border-radius: 12px; padding: 1.5rem 2rem;
  display: flex; align-items: center; gap: 1.2rem;
  margin-bottom: 1.5rem;
  position: relative; overflow: hidden;
}
.role-stripe::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
}
.role-stripe-icon { font-size: 2.2rem; }
.role-stripe-info h3 {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase;
}
.role-stripe-info p {
  font-size: 0.85rem; opacity: 0.8; margin-top: 0.2rem;
}

/* ── CALENDAR ── */
.mini-cal { }
.cal-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 4px; margin-top: 0.8rem;
}
.cal-day-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 1px; color: var(--muted);
  text-transform: uppercase; text-align: center; padding: 0.3rem 0;
}
.cal-day {
  width: 100%; aspect-ratio: 1; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
  color: var(--muted);
}
.cal-day:hover { background: rgba(0,180,216,0.12); color: var(--white); }
.cal-day.today {
  background: linear-gradient(135deg, #2563eb, var(--cyan));
  color: var(--navy); font-weight: 700;
}
.cal-day.event {
  background: rgba(0,180,216,0.12);
  border: 1px solid rgba(0,180,216,0.3); color: var(--cyan);
}
.cal-day.empty { pointer-events: none; }

/* ── NOTIFICATION TOAST ── */
#toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: rgba(8,15,34,0.97); border: 1px solid var(--border);
  border-radius: 10px; padding: 1rem 1.4rem;
  display: flex; align-items: center; gap: 0.8rem;
  z-index: 9999; max-width: 340px;
  transform: translateY(120%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#toast.show { transform: translateY(0); }
#toast .toast-icon { font-size: 1.3rem; }
#toast .toast-msg { font-size: 0.88rem; color: var(--white); }
#toast .toast-border {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--cyan); border-radius: 10px 0 0 10px;
}

/* ── CHART BAR ── */
.chart-bars {
  display: flex; align-items: flex-end; gap: 6px;
  height: 120px; padding-top: 1rem;
}
.bar-col {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.bar-fill {
  width: 100%; border-radius: 4px 4px 0 0;
  background: linear-gradient(0deg, #2563eb, var(--cyan));
  transition: height 1s cubic-bezier(0.16,1,0.3,1);
  min-height: 4px;
}
.bar-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem; letter-spacing: 1px;
  color: var(--muted); text-transform: uppercase;
}

/* ── MEMBER LIST ── */
.member-row {
  display: flex; align-items: center; gap: 0.9rem;
  padding: 0.7rem 0; border-bottom: 1px solid rgba(0,180,216,0.06);
}
.member-row:last-child { border-bottom: none; }
.member-av {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 0.85rem; color: var(--navy); flex-shrink: 0;
}
.member-info { flex: 1; min-width: 0; }
.member-info strong {
  display: block; font-family: 'Rajdhani', sans-serif;
  font-size: 0.92rem; color: var(--white);
}
.member-info small {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 1px; color: var(--muted);
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
@media (max-width: 900px) {

  .main-content { margin-left: 0; padding: 1.5rem 1rem; }

/* ─── HELPERS ─── */
function buildMiniCal() {
  const days = ['L','M','M','J','V','S','D'];
  const events = [4, 12, 20, 27];
  let html = `<div class="cal-grid">`;
  days.forEach(d => html += `<div class="cal-day-lbl">${d}</div>`);
  for (let i=0;i<3;i++) html += `<div class="cal-day empty"></div>`;
  for (let i=1;i<=30;i++) {
    const cls = i===6?'today':events.includes(i)?'event':'';
    html += `<div class="cal-day ${cls}" title="${events.includes(i)?'Événement':''}">${i}</div>`;
  }
  html += '</div>';
  return html;
}

function buildBarChart() {
  const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const vals   = [35,50,45,70,60,80,55,90,75,85,60,95];
  const max = Math.max(...vals);
  return `<div class="chart-bars">${months.map((m,i)=>`
    <div class="bar-col">
      <div class="bar-fill" style="height:${(vals[i]/max*100)}%;"></div>
      <div class="bar-lbl">${m}</div>
    </div>`).join('')}</div>`;
}

function buildProgress() {
  const goals = [
    { lbl:'Nouveaux membres', val:52, max:80 },
    { lbl:'Ateliers réalisés', val:18, max:24 },
    { lbl:'Budget collecté',   val:320, max:500, suffix:'k' },
    { lbl:'Publications',      val:127, max:200 },
  ];
  return goals.map(g => `
    <div style="margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem;">
        <span style="font-size:0.82rem;color:var(--muted);">${g.lbl}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--cyan);">${g.val}${g.suffix||''}/${g.max}${g.suffix||''}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(g.val/g.max*100)}%;"></div></div>
    </div>`).join('');
}

/* ─── SIDEBAR TOGGLE ─── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ─── TOAST ─── */
function showToast(msg, icon='✅') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
