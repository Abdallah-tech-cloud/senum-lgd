<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENUM LGD · Espace Administrateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--navy:#050a1a;--dark:#080f22;--card-bg:#0b1428;--blue-deep:#0d1b5e;--blue-mid:#1a3a8f;--blue-bright:#2563eb;--cyan:#00b4d8;--cyan-light:#48cae4;--white:#e8f4ff;--muted:#7ea8c9;--border:rgba(0,180,216,0.18);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:'Exo 2',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(37,99,235,.1) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(0,180,216,.08) 0%,transparent 60%);pointer-events:none;z-index:0;}
.circuit-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.035;background-image:linear-gradient(rgba(0,180,216,1) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,1) 1px,transparent 1px);background-size:60px 60px;}

/* ── LOGIN ── */
#loginPage{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{background:rgba(8,15,34,.97);border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 40px 100px rgba(0,0,0,.6);animation:loginIn .6s cubic-bezier(.16,1,.3,1);}
@keyframes loginIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:none;}}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo img{height:64px;filter:drop-shadow(0 0 16px rgba(0,180,216,.5));animation:floatImg 3s ease-in-out infinite;}
@keyframes floatImg{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.login-logo h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;letter-spacing:4px;background:linear-gradient(90deg,#2563eb,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:.8rem;}
.login-logo p{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:3px;color:var(--muted);margin-top:.3rem;}
.l-label{font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:.45rem;}
.l-input,.l-select{width:100%;background:rgba(5,10,26,.8);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;color:var(--white);font-family:'Exo 2',sans-serif;font-size:.95rem;outline:none;margin-bottom:1.2rem;transition:all .3s;}
.l-input:focus,.l-select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,180,216,.1);}
.l-select option{background:#080f22;}
.l-btn{width:100%;padding:1rem;background:linear-gradient(90deg,#2563eb,var(--cyan));border:none;border-radius:8px;color:var(--navy);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;box-shadow:0 0 24px rgba(0,180,216,.3);}
.l-btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(0,180,216,.5);}
.l-error{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:.8rem 1rem;color:#fca5a5;font-size:.85rem;margin-bottom:1rem;text-align:center;}
.pwd-hint{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:1px;color:rgba(0,180,216,.4);text-align:center;margin-top:.6rem;}
.back-link{display:block;text-align:center;margin-top:1.5rem;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:2px;color:var(--muted);text-decoration:none;transition:color .2s;}
.back-link:hover{color:var(--cyan);}

/* ── ADMIN LAYOUT ── */
#adminPage{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:rgba(8,15,34,.97);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s;}
.sidebar-logo{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo img{height:36px;filter:drop-shadow(0 0 8px rgba(0,180,216,.4));}
.sidebar-logo span{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:3px;background:linear-gradient(90deg,#2563eb,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sidebar-user{margin:1.2rem 1.2rem .8rem;background:rgba(13,27,94,.3);border:1px solid var(--border);border-radius:10px;padding:1rem;display:flex;align-items:center;gap:.8rem;}
.sidebar-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;border:2px solid transparent;}
.sidebar-user-info{flex:1;min-width:0;}
.sidebar-user-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-role{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;}
.sidebar-nav{flex:1;padding:.5rem 0;overflow-y:auto;}
.nav-section-label{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:3px;color:rgba(126,168,201,.4);text-transform:uppercase;padding:.8rem 1.5rem .4rem;}
.nav-item{display:flex;align-items:center;gap:.8rem;padding:.7rem 1.5rem;cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.95rem;color:var(--muted);user-select:none;}
.nav-item:hover{color:var(--white);background:rgba(0,180,216,.05);}
.nav-item.active{color:var(--white);background:rgba(0,180,216,.08);border-left-color:var(--cyan);}
.nav-icon{font-size:1rem;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--cyan);color:var(--navy);font-size:.65rem;font-weight:700;padding:1px 7px;border-radius:10px;}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:.75rem;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#fca5a5;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.logout-btn:hover{background:rgba(239,68,68,.15);}
.main-content{margin-left:260px;min-height:100vh;padding:2rem;position:relative;z-index:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.topbar-left h2{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-left p{font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:2px;color:var(--muted);margin-top:.2rem;}
.topbar-right{display:flex;align-items:center;gap:.8rem;}
.top-btn{width:38px;height:38px;background:rgba(13,27,94,.4);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;text-decoration:none;}
.top-btn:hover{border-color:var(--cyan);}
.hamburger-admin{display:none;width:38px;height:38px;background:rgba(13,27,94,.4);border:1px solid var(--border);border-radius:8px;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:5px;}
.hamburger-admin span{display:block;width:18px;height:1.5px;background:var(--cyan);}
.panel{display:none;animation:panelIn .4s cubic-bezier(.16,1,.3,1);}
.panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fb-status{display:inline-flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid;}
.fb-status.connected{color:#22c55e;background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);}
.fb-status.connected::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 1.5s infinite;}
.fb-status.disconnected{color:#fcd34d;background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);}
.fb-status.disconnected::before{content:'';width:6px;height:6px;border-radius:50%;background:#f59e0b;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── COMPOSANTS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.5rem;position:relative;overflow:hidden;transition:all .3s;}
.stat-card:hover{border-color:rgba(0,180,216,.35);transform:translateY(-2px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.c1::before{background:linear-gradient(90deg,#2563eb,var(--cyan));}
.stat-card.c2::before{background:linear-gradient(90deg,var(--cyan),#10b981);}
.stat-card.c3::before{background:linear-gradient(90deg,#8b5cf6,#ec4899);}
.stat-card.c4::before{background:linear-gradient(90deg,#f59e0b,#ef4444);}
.stat-icon{font-size:1.6rem;margin-bottom:.8rem;}
.stat-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2.2rem;background:linear-gradient(90deg,#60a5fa,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:.3rem;}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem;}
.card-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:.6rem;}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);flex-shrink:0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.f-group{margin-bottom:1rem;}
.f-label{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem;}
.f-input,.f-select,.f-textarea{width:100%;background:rgba(5,10,26,.7);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;color:var(--white);font-family:'Exo 2',sans-serif;font-size:.9rem;outline:none;transition:all .3s;}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,180,216,.1);}
.f-textarea{resize:vertical;min-height:90px;}
.f-select option{background:#080f22;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.btn{padding:.7rem 1.5rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:1.5px;text-transform:uppercase;border-radius:8px;border:none;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(90deg,#2563eb,var(--cyan));color:var(--navy);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,180,216,.4);}
.btn-ghost{background:transparent;color:var(--cyan);border:1px solid rgba(0,180,216,.3);}
.btn-ghost:hover{background:rgba(0,180,216,.08);border-color:var(--cyan);}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.btn-success{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);}
.btn-sm{padding:.4rem .9rem;font-size:.78rem;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;}
.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);}
.badge-blue{background:rgba(37,99,235,.15);color:#93c5fd;border:1px solid rgba(37,99,235,.3);}
.badge-yellow{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3);}
.badge-red{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:.7rem 1rem;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:.85rem 1rem;font-size:.9rem;color:var(--muted);border-bottom:1px solid rgba(0,180,216,.06);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(0,180,216,.04);color:var(--white);}
.member-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563eb,var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;color:var(--navy);flex-shrink:0;}
.progress-bar{background:rgba(0,180,216,.1);border-radius:4px;height:6px;overflow:hidden;margin-top:.4rem;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,var(--cyan));}
.annonce-preview{background:rgba(5,10,26,.6);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:1rem;display:flex;gap:1rem;align-items:flex-start;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299;}
.sidebar-overlay.show{display:block;}

/* ── DEMO MODE BANNER ── */
.demo-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.demo-banner p{font-size:.85rem;color:#fcd34d;line-height:1.6;flex:1;}
.demo-banner strong{color:#f59e0b;}

/* ── SAVING ── */
#savingIndicator{display:none;position:fixed;top:80px;right:2rem;background:rgba(8,15,34,.9);border:1px solid rgba(0,180,216,.3);border-radius:8px;padding:.6rem 1.2rem;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:2px;color:var(--cyan);z-index:500;align-items:center;gap:.5rem;}
#savingIndicator.show{display:flex;}

/* ── TOAST ── */
#toast{position:fixed;bottom:2rem;right:2rem;background:rgba(8,15,34,.97);border:1px solid var(--border);border-radius:10px;padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem;z-index:9999;max-width:340px;transform:translateY(120%);transition:transform .4s cubic-bezier(.16,1,.3,1);box-shadow:0 20px 60px rgba(0,0,0,.5);}
#toast.show{transform:translateY(0);}
#toast .t-border{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan);border-radius:10px 0 0 10px;}
#toast .t-msg{font-size:.88rem;color:var(--white);}

@media(max-width:900px){.sidebar{transform:translateX(-100%);z-index:300;}.sidebar.open{transform:translateX(0);}.main-content{margin-left:0;padding:1.5rem 1rem;}.hamburger-admin{display:flex;}.two-col,.f-row{grid-template-columns:1fr;}.stats-row{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.stats-row{grid-template-columns:1fr;}.login-box{padding:2rem 1.5rem;}}
</style>
</head>
<body>
<div class="circuit-bg"></div>
<div id="savingIndicator">⏳ Enregistrement...</div>

<!-- ══ LOGIN ══ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <img src="Logo_Senum_tr.png" alt="SENUM" onerror="this.style.display='none'">
      <h1>SENUM LGD</h1>
      <p>Espace Administrateur · Bureau</p>
    </div>
    <div class="l-error" id="loginError">Identifiants incorrects. Réessayez.</div>
    <label class="l-label">Rôle / Poste</label>
    <select class="l-select" id="roleSelect">
      <option value="">— Sélectionner votre poste —</option>
      <option value="president">👑 Président(e)</option>
      <option value="vp">🔷 Vice-Président(e)</option>
      <option value="sg">📋 Secrétaire Général(e)</option>
      <option value="tresorier">💰 Trésorier(e)</option>
      <option value="formation">🎓 Responsable Formation</option>
      <option value="comm">📣 Responsable Communication</option>
    </select>
    <label class="l-label">Mot de passe</label>
    <input class="l-input" type="password" id="pwInput" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="l-btn" onclick="doLogin()">🔐 &nbsp;Accéder au tableau de bord</button>
    <p class="pwd-hint">Mots de passe : president2024 / vp2024 / sg2024 / tresor2024 / formation2024 / comm2024</p>
    <a class="back-link" href="index.html">← Retour au site public</a>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div id="adminPage">
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="Logo_Senum_tr.png" alt="" onerror="this.style.display='none'">
      <span>SENUM LGD</span>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebarName">Membre</div>
        <div class="sidebar-user-role" id="sidebarRole" style="color:var(--cyan);">BUREAU · SENUM</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-section-label">Navigation</div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">⏻ &nbsp;Déconnexion</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <div class="hamburger-admin" onclick="toggleSidebar()">
          <span></span><span></span><span></span>
        </div>
        <div class="topbar-left">
          <h2 id="topbarTitle">Tableau de bord</h2>
          <p id="topbarSub"></p>
        </div>
      </div>
      <div class="topbar-right">
        <div id="fbStatusBadge" class="fb-status disconnected">Mode démo</div>
        <a class="top-btn" href="index.html" target="_blank" title="Voir le site">🌐</a>
      </div>
    </div>
    <div id="panelsContainer"></div>
  </main>
</div>

<div id="toast">
  <div class="t-border"></div>
  <div style="font-size:1.3rem;" id="toastIcon">✅</div>
  <div class="t-msg" id="toastMsg"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   HELPERS — définis en premier, disponibles partout
═══════════════════════════════════════════════════ */
function safeEsc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function hexToRgb(h) {
  h = h.replace('#','');
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return isNaN(r) ? '37,99,235' : r+','+g+','+b;
}
function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
function setVal(id, val) {
  if (!val) return;
  const el = document.getElementById(id);
  if (el) el.value = val;
}
function setText(id, val) {
  if (!val) return;
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}
function showToast(msg, icon) {
  icon = icon || '✅';
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = icon;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3500);
}
function showSaving(on) {
  document.getElementById('savingIndicator').classList.toggle('show', on);
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ═══════════════════════════════════════════════════
   FIREBASE — chargement dynamique (ne bloque pas si indisponible)
═══════════════════════════════════════════════════ */
// ⚠️ Remplacez par votre vraie config Firebase
var FIREBASE_CONFIG = {
  apiKey:            "VOTRE_API_KEY",
  authDomain:        "VOTRE_PROJECT_ID.firebaseapp.com",
  projectId:         "VOTRE_PROJECT_ID",

  messagingSenderId: "VOTRE_SENDER_ID",
  appId:             "VOTRE_APP_ID"
};

var _db = null;
var _siteRef = null;
var _firebaseOK = false;

// Mode démo par défaut — toutes les fonctions Firebase sont safe
var FB = {
  isOK: function() { return _firebaseOK; },
  save: function(data) {
    if (!_firebaseOK) { showToast('Firebase non configuré — modifications non sauvegardées', '⚠️'); return Promise.resolve(false); }
    return _fbSave(data);
  },
  addAnnonce: function(ann) {
    if (!_firebaseOK) { showToast('Firebase non configuré — annonce non publiée', '⚠️'); return Promise.resolve(false); }
    return _fbAddAnnonce(ann);
  },
  deleteAnnonce: function(idx) {
    if (!_firebaseOK) { showToast('Firebase non configuré', '⚠️'); return Promise.resolve(); }
    return _fbDeleteAnnonce(idx);
  },
  onSnap: function(cb) {
    if (!_firebaseOK || !_siteRef) return;
    try { _fbOnSnap(_siteRef, cb); } catch(e) {}
  }
};

// Tente de charger Firebase de façon asynchrone
(async function initFirebase() {
  if (FIREBASE_CONFIG.apiKey === 'VOTRE_API_KEY') return; // pas encore configuré
  try {
    const { initializeApp }    = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot }
      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    const app  = initializeApp(FIREBASE_CONFIG);
    _db        = getFirestore(app);
    _siteRef   = doc(_db, 'senum', 'site');
    _fbOnSnap  = onSnapshot;

    // test ping
    await getDoc(_siteRef);
    _firebaseOK = true;

    const badge = document.getElementById('fbStatusBadge');
    if (badge) { badge.textContent = 'Firebase connecté'; badge.className = 'fb-status connected'; }

    // Stocke les fonctions Firebase dans la closure
    _fbSave = async function(data) {
      showSaving(true);
      try {
        const snap = await getDoc(_siteRef);
        if (snap.exists()) await updateDoc(_siteRef, data);
        else await setDoc(_siteRef, data);
        showSaving(false);
        showToast('Modifications enregistrées !', '✅');
        return true;
      } catch(e) { showSaving(false); showToast('Erreur : ' + e.message, '❌'); return false; }
    };

    _fbAddAnnonce = async function(ann) {
      showSaving(true);
      try {
        const snap = await getDoc(_siteRef);
        var list = snap.exists() ? (snap.data().annonces || []) : [];
        list.unshift(ann);
        if (snap.exists()) await updateDoc(_siteRef, {annonces: list});
        else await setDoc(_siteRef, {annonces: list});
        showSaving(false);
        showToast('Annonce publiée !', '📢');
        return true;
      } catch(e) { showSaving(false); showToast('Erreur : ' + e.message, '❌'); return false; }
    };

    _fbDeleteAnnonce = async function(idx) {
      showSaving(true);
      try {
        const snap = await getDoc(_siteRef);
        var list = snap.exists() ? (snap.data().annonces || []) : [];
        list.splice(idx, 1);
        await updateDoc(_siteRef, {annonces: list});
        showSaving(false);
        showToast('Annonce supprimée', '🗑️');
      } catch(e) { showSaving(false); showToast('Erreur : ' + e.message, '❌'); }
    };

    // Si déjà connecté, rafraîchit les formulaires
    if (typeof populateForms === 'function') {
      const snap2 = await getDoc(_siteRef);
      if (snap2.exists()) populateForms(snap2.data());
    }

  } catch(e) {
    console.warn('Firebase non disponible (mode démo actif) :', e.message);
  }
})();

function doLogin() {
  var role = document.getElementById('roleSelect').value;
  var pw   = document.getElementById('pwInput').value;
  var err  = document.getElementById('loginError');
  if (!role) {
    err.style.display='block'; err.textContent='Veuillez sélectionner votre poste.'; return;
  }
  if (!ROLES[role] || pw !== ROLES[role].pwd) {
    err.style.display='block'; err.textContent='Mot de passe incorrect.'; return;
  }
  err.style.display='none';
  currentRole = role;
  try {
    buildAdmin(role);
  } catch(e) {
    console.error('Erreur buildAdmin :', e);
    showToast('Erreur au chargement du tableau de bord : ' + e.message, '❌');

  document.getElementById('adminPage').style.display='block';
  showToast('Bienvenue, ' + ROLES[role].label + ' !', ROLES[role].emoji);
}

   PANELS — build avec try/catch individuel
═══════════════════════════════════════════════════ */
function buildPanels(role) {
  var container = document.getElementById('panelsContainer');
  container.innerHTML = '';

  var allPanels = ['overview','site','annonces','equipe','stats'];
  allPanels.forEach(function(pid) {
    var div = document.createElement('div');
    div.className = 'panel';
    div.id = 'panel_' + pid;
    try {
      div.innerHTML = getPanel(pid, role);
    } catch(e) {
      console.error('Erreur panel ' + pid + ':', e);
      div.innerHTML = '<div class="card"><p style="color:#fca5a5;">Erreur de chargement du panel "' + pid + '" : ' + safeEsc(e.message) + '</p></div>';
    }
    container.appendChild(div);
  });
}

function getPanel(pid, role) {
  switch(pid) {
    case 'overview':  return panelOverview(role);
    case 'site':      return panelSite();
    case 'annonces':  return panelAnnonces();
    case 'equipe':    return panelEquipe();
    case 'stats':     return panelStats();
    default: return '<p style="color:var(--muted);padding:2rem;">Panel non disponible.</p>';
  }
}

function switchPanel(id, el) {
  document.querySelectorAll('.nav-item').forEach(function(e) { e.classList.remove('active'); });
  if (el) el.classList.add('active');
  switchPanelById(id);
  closeSidebar();
  if (id === 'annonces') setTimeout(loadAnnonces, 200);
}
function switchPanelById(id) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var p = document.getElementById('panel_' + id);
  if (p) p.classList.add('active');
}

      '<input class="f-input eq-nom" data-idx="' + i + '" placeholder="Prénom Nom" value="' + safeEsc(m.nom || '') + '"></div>' +
      '<div class="f-group"><label class="f-label">Initiales</label>' +
      '<input class="f-input eq-init" data-idx="' + i + '" placeholder="AM" value="' + safeEsc(m.initiales || '') + '" maxlength="3"></div>' +
      '</div>' +
      '<div class="f-group"><label class="f-label">Description</label>' +
      '<input class="f-input eq-desc" data-idx="' + i + '" placeholder="Description du rôle" value="' + safeEsc(m.description || '') + '"></div>' +
      '</div>';
  }
  return html;
}

function panelEquipe() {
  var editor = '';
  try { editor = buildEquipeEditor(defaultEquipe()); }
  catch(e) { editor = '<p style="color:#fca5a5;">Erreur : ' + safeEsc(e.message) + '</p>'; }

  return '<div class="card">' +
    '<div class="card-header"><div class="card-title"><div class="dot"></div>Membres du bureau</div>' +
    '<button class="btn btn-primary btn-sm" onclick="saveEquipe()">💾 Enregistrer tout</button>' +
    '</div>' +
    '<p style="color:var(--muted);font-size:.88rem;margin-bottom:1.2rem;">Modifiez les informations de chaque membre. Ces données s\'affichent sur le site public.</p>' +
    '<div id="equipeEditor">' + editor + '</div>' +
    '</div>';
}

/* ═══════════════════════════════════════════════════
   PANEL : STATS
═══════════════════════════════════════════════════ */
function panelStats() {
  var goals = [
    {l:'Nouveaux membres',    v:52, m:100},
    {l:'Ateliers réalisés',   v:18, m:30},
    {l:'Événements organisés',v:8,  m:20},
    {l:'Publications',        v:45, m:100}
  ];
  var bars = goals.map(function(g) {
    return '<div style="margin-bottom:1rem;">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:.3rem;">' +
      '<span style="font-size:.85rem;color:var(--muted);">' + g.l + '</span>' +
      '<span style="font-family:\'Share Tech Mono\',monospace;font-size:.72rem;color:var(--cyan);">' + g.v + '/' + g.m + '</span>' +
      '</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.round(g.v/g.m*100) + '%;"></div></div>' +
      '</div>';
  }).join('');

  return '<div class="stats-row">' +
    '<div class="stat-card c1"><div class="stat-icon">👥</div><div class="stat-num" id="st_membres">—</div><div class="stat-lbl">Membres</div></div>' +
    '<div class="stat-card c2"><div class="stat-icon">🛠️</div><div class="stat-num" id="st_ateliers">—</div><div class="stat-lbl">Ateliers</div></div>' +
    '<div class="stat-card c3"><div class="stat-icon">🤝</div><div class="stat-num" id="st_part">—</div><div class="stat-lbl">Partenaires</div></div>' +
    '<div class="stat-card c4"><div class="stat-icon">📢</div><div class="stat-num" id="st_ann">—</div><div class="stat-lbl">Annonces</div></div>' +
    '</div>' +
    '<div class="card"><div class="card-header"><div class="card-title"><div class="dot"></div>Progression des objectifs annuels</div></div>' +
    bars + '</div>';
}

/* ═══════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════ */
function saveSite(section) {
  var data = {};
  if (section === 'hero') {
    data.hero = {badge:getVal('heroB'), titre:getVal('heroT'), soustitre:getVal('heroS')};
  } else if (section === 'stats') {
    data.stats = {membres:getVal('stM'), annees:getVal('stA'), ateliers:getVal('stAt'), partenaires:getVal('stP')};
  } else if (section === 'contact') {
    data.contact = {adresse:getVal('cAddr'), email:getVal('cEmail'), telephone:getVal('cTel'),
      reseaux:getVal('cRs'), facebook:getVal('cFb'), instagram:getVal('cIg'),
      youtube:getVal('cYt'), twitter:getVal('cTw')};
  }
  FB.save(data);
}

function saveEquipe() {
  var equipe = defaultEquipe();
  document.querySelectorAll('.eq-nom').forEach(function(el) {
    var i = parseInt(el.dataset.idx);
    if (!isNaN(i) && equipe[i]) equipe[i].nom = el.value;
  });
  document.querySelectorAll('.eq-init').forEach(function(el) {
    var i = parseInt(el.dataset.idx);
    if (!isNaN(i) && equipe[i]) equipe[i].initiales = el.value;
  });
  document.querySelectorAll('.eq-desc').forEach(function(el) {
    var i = parseInt(el.dataset.idx);
    if (!isNaN(i) && equipe[i]) equipe[i].description = el.value;
  });
  FB.save({equipe: equipe});
}

function publishAnnonce() {
  var titre   = getVal('anTitre');
  var contenu = getVal('anContenu');
  var type    = getVal('anType');
  if (!titre || !contenu) { showToast('Remplissez le titre et le contenu', '⚠️'); return; }
  var ann = {
    titre: titre, contenu: contenu, type: type,
    date: new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'})
  };
  FB.addAnnonce(ann).then(function(ok) {
    if (ok) { clearAnnonce(); setTimeout(loadAnnonces, 500); }
  });
}

function previewAnnonce() {
  document.getElementById('anPreview').style.display = 'block';
  setText('prvTitle',   getVal('anTitre')   || '(sans titre)');
  setText('prvContent', getVal('anContenu') || '(sans contenu)');
  setText('prvType',    getVal('anType')    || 'info');
  setText('prvDate', new Date().toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'}));
}

function clearAnnonce() {
  ['anTitre','anContenu'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  var prev = document.getElementById('anPreview');
  if (prev) prev.style.display = 'none';
}

async function loadAnnonces() {
  var c = document.getElementById('annoncesList');
  if (!c) return;
  if (!FB.isOK()) {
    c.innerHTML = '<p style="color:var(--muted);font-size:.88rem;">Connectez Firebase pour voir les annonces publiées.</p>';
    return;
  }
  try {
    var { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    var snap = await getDoc(_siteRef);
    var list = (snap.exists() ? (snap.data().annonces || []) : []);
    if (!list.length) {
      c.innerHTML = '<p style="color:var(--muted);font-size:.88rem;text-align:center;padding:2rem;">Aucune annonce publiée.</p>';
      return;
    }
    c.innerHTML = list.map(function(a, i) {
      return '<div style="background:rgba(5,10,26,.5);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:start;gap:1rem;">' +
        '<div><div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem;">' +
        '<span class="badge badge-blue">' + safeEsc(a.type || 'info') + '</span>' +
        '<span style="font-family:\'Rajdhani\',sans-serif;font-weight:700;color:var(--white);">' + safeEsc(a.titre || '') + '</span>' +
        '</div>' +
        '<div style="font-size:.82rem;color:var(--muted);">' + safeEsc(a.contenu || '') + '</div>' +
        '<div style="font-family:\'Share Tech Mono\',monospace;font-size:.58rem;color:rgba(126,168,201,.4);margin-top:.4rem;">' + safeEsc(a.date || '') + '</div>' +
        '</div>' +
        '<button class="btn btn-danger btn-sm" onclick="delAnnonce(' + i + ')" style="flex-shrink:0;">🗑️</button>' +
        '</div>';
    }).join('');
  } catch(e) {
    c.innerHTML = '<p style="color:#fca5a5;">Erreur : ' + safeEsc(e.message) + '</p>';
  }
}

function delAnnonce(i) {
  if (!confirm('Supprimer cette annonce définitivement ?')) return;
  FB.deleteAnnonce(i).then(function() { loadAnnonces(); });
}

/* ═══════════════════════════════════════════════════
   POPULATE depuis Firebase
═══════════════════════════════════════════════════ */
function populateForms(d) {
  if (!d) return;
  if (d.stats) {
    setText('ov_membres',    d.stats.membres     || '—');
    setText('ov_ateliers',   d.stats.ateliers    || '—');
    setText('ov_partenaires',d.stats.partenaires || '—');
    setText('st_membres',    d.stats.membres     || '—');
    setText('st_ateliers',   d.stats.ateliers    || '—');
    setText('st_part',       d.stats.partenaires || '—');
    setVal('stM',  d.stats.membres);
    setVal('stA',  d.stats.annees);
    setVal('stAt', d.stats.ateliers);
    setVal('stP',  d.stats.partenaires);
  }
  var annCount = (d.annonces || []).length;
  setText('ov_annonces', annCount);
  setText('st_ann',      annCount);

  if (d.hero) {
    setVal('heroB', d.hero.badge);
    setVal('heroT', d.hero.titre);
    setVal('heroS', d.hero.soustitre);
  }
  if (d.contact) {
    setVal('cAddr', d.contact.adresse);
    setVal('cEmail',d.contact.email);
    setVal('cTel',  d.contact.telephone);
    setVal('cRs',   d.contact.reseaux);
    setVal('cFb',   d.contact.facebook);
    setVal('cIg',   d.contact.instagram);
    setVal('cYt',   d.contact.youtube);
    setVal('cTw',   d.contact.twitter);
  }
  if (d.equipe && d.equipe.length) {
    var editor = document.getElementById('equipeEditor');
    if (editor) {
      try { editor.innerHTML = buildEquipeEditor(d.equipe); }
      catch(e) { console.warn('buildEquipeEditor error:', e); }
    }
  }
  setTimeout(loadAnnonces, 400);
}

/* ═══════════════════════════════════════════════════
   NAVIGATION HELPER
═══════════════════════════════════════════════════ */
function navTo(id) {
  var found = null;
  document.querySelectorAll('.nav-item').forEach(function(el) {
    if (el.getAttribute('data-panel') === id) found = el;
  });
  switchPanel(id, found);
}
</script>
</body>
</html>
